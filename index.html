<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>⚡ ENCICLOPEDIA MUN · DISCURSOS RÁPIDOS</title>
  <style>
    /* ===== RESET & DARK MODE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', Roboto, sans-serif;
    }

    body {
      background: #0b0e14;
      color: #e3e9f2;
      padding: 1.5rem 1.2rem 2.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-container {
      max-width: 1400px;
      width: 100%;
    }

    /* ===== TÍTULO PRINCIPAL ===== */
    h1 {
      font-weight: 500;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span {
      background: #1f2a3c;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 400;
      color: #b0c7e9;
    }

    .subhead {
      color: #9aaec2;
      margin-bottom: 2rem;
      border-left: 4px solid #3a7ca5;
      padding-left: 16px;
      font-weight: 350;
    }

    /* ===== FORMULARIO CREACIÓN RÁPIDA ===== */
    .creator-panel {
      background: #131a24;
      border-radius: 28px;
      padding: 1.8rem 2rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 12px 24px -8px rgba(0,0,0,0.6);
      border: 1px solid #253141;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 20px 25px;
    }

    .input-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-field label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #b7c9e0;
      letter-spacing: 0.3px;
    }

    .input-field input, .input-field textarea, .input-field select {
      background: #1c2633;
      border: 1px solid #2e3e51;
      border-radius: 18px;
      padding: 12px 16px;
      color: #f0f6ff;
      font-size: 1rem;
      transition: all 0.15s;
      outline: none;
      resize: vertical;
    }

    .input-field input:focus, .input-field textarea:focus, .input-field select:focus {
      border-color: #5f9fd3;
      box-shadow: 0 0 0 3px rgba(95,159,211,0.25);
    }

    textarea {
      min-height: 90px;
    }

    .cat-selector {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cat-selector select {
      flex: 1;
      background: #1c2633;
    }

    .btn-primary {
      background: #2d6fa5;
      border: none;
      border-radius: 40px;
      padding: 14px 24px;
      font-weight: 600;
      font-size: 1.1rem;
      color: white;
      box-shadow: 0 6px 12px rgba(45,111,165,0.3);
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #4790cf;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary:hover {
      background: #347eb9;
      transform: scale(1.01);
      box-shadow: 0 8px 16px rgba(69,145,210,0.4);
    }

    /* ===== FILTROS + BÚSQUEDA ===== */
    .filters-section {
      margin-bottom: 28px;
    }

    .search-wrapper {
      margin-bottom: 18px;
    }

    .search-wrapper input {
      width: 100%;
      background: #101720;
      border: 1px solid #2d4053;
      border-radius: 48px;
      padding: 16px 24px;
      color: #f0f6ff;
      font-size: 1.1rem;
      backdrop-filter: blur(4px);
    }

    .filter-btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 8px;
    }

    .filter-btn {
      background: #1b2532;
      border: 1px solid #31465c;
      color: #cddcee;
      padding: 10px 20px;
      border-radius: 36px;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .filter-btn.active {
      background: #3a7ca5;
      border-color: #7ab3e0;
      color: white;
      box-shadow: 0 0 0 2px rgba(90,170,240,0.3);
    }

    .filter-btn.fav-active {
      background: #d4a72c;
      border-color: #f5cd6d;
      color: #0b0e14;
    }

    /* ===== TARJETAS ===== */
    .discursos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 22px;
      margin-top: 10px;
    }

    .card {
      background: #121b24;
      border-radius: 26px;
      padding: 1.5rem 1.3rem;
      box-shadow: 0 15px 25px -8px #03070a;
      border: 1px solid #263544;
      transition: transform 0.2s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }

    .card:hover {
      box-shadow: 0 20px 28px -10px #010304;
      border-color: #3f566b;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }

    .favorite-star {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #7e8d9f;
      transition: 0.1s;
      line-height: 1;
      padding: 0 5px;
    }

    .favorite-star.active-star {
      color: #f5c84e;
      text-shadow: 0 0 8px #ffd966;
    }

    .descripcion {
      color: #a3bbd1;
      margin: 10px 0 12px;
      font-size: 0.95rem;
      border-left: 3px solid #3e5f7e;
      padding-left: 14px;
      font-style: italic;
    }

    /* ETIQUETA CATEGORÍA CON COLOR */
    .category-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      align-self: flex-start;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* COLORES OBLIGATORIOS */
    .badge-prop-corta { background: #1e5f9e; color: white; box-shadow: 0 2px 8px #1e5f9e55; }
    .badge-prop-larga { background: #6b3fa0; color: white; box-shadow: 0 2px 8px #6b3fa055; }
    .badge-defensa { background: #b13e3e; color: white; box-shadow: 0 2px 8px #b13e3e55; }
    .badge-frases { background: #2f855a; color: white; box-shadow: 0 2px 8px #2f855a55; }

    .contenido-ocultable {
      margin: 8px 0 15px;
      background: #0d151e;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px dashed #365573;
      color: #d3e2fd;
      font-size: 0.95rem;
      line-height: 1.5;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .contenido-ocultable.mostrado {
      display: block;
      animation: fadeSlide 0.25s ease;
    }

    @keyframes fadeSlide {
      0% { opacity: 0.4; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .btn-icon {
      background: #1f2d3c;
      border: 1px solid #3a5068;
      color: #e0ecfc;
      padding: 8px 14px;
      border-radius: 34px;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 2px 4px #00000033;
    }

    .btn-icon:hover {
      background: #2a3e54;
      border-color: #6086ac;
    }

    .btn-delete {
      background: #3d2828;
      border-color: #8b4e4e;
      color: #ffd9d9;
    }

    .btn-delete:hover {
      background: #5e3434;
      border-color: #c46b6b;
    }

    .btn-edit {
      background: #2a3a2a;
      border-color: #4e7a4e;
      color: #d9ffd9;
    }

    .btn-edit:hover {
      background: #3a523a;
      border-color: #6ea86e;
    }

    .empty-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: #889bb0;
      font-size: 1.2rem;
      background: #0f1821;
      border-radius: 50px;
    }

    /* Modal de edición */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: #131a24;
      border-radius: 28px;
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid #3a5068;
      box-shadow: 0 25px 40px #00000080;
    }

    .modal-content h3 {
      margin-bottom: 20px;
      color: #d3e2fd;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn-secondary {
      background: #2a3848;
      border: 1px solid #4a6077;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* scroll fluido */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0e161f; }
    ::-webkit-scrollbar-thumb { background: #314d66; border-radius: 10px; }
  </style>
</head>
<body>
<div class="app-container">
  <h1>📜 Enciclopedia MUN <span>discurso rápido</span></h1>
  <div class="subhead">⚡ Crea · Edita · Filtra · Copia · Debate sin pausa</div>

  <!-- FORMULARIO CREACIÓN -->
  <div class="creator-panel">
    <div class="form-grid">
      <div class="input-field">
        <label>📌 TÍTULO</label>
        <input type="text" id="tituloInput" placeholder="Ej: Moción de procedimiento" maxlength="60">
      </div>
      <div class="input-field">
        <label>📂 CATEGORÍA (color)</label>
        <div class="cat-selector">
          <select id="categoriaSelect">
            <option value="Propuesta corta">🔵 Propuesta corta</option>
            <option value="Propuesta larga">🟣 Propuesta larga</option>
            <option value="Defensa">🔴 Defensa</option>
            <option value="Frases">🟢 Frases</option>
          </select>
        </div>
      </div>
      <div class="input-field">
        <label>📝 BREVE DESCRIPCIÓN (cuándo usarlo)</label>
        <input type="text" id="descripcionInput" placeholder="Para inicio de sesión, punto de orden...">
      </div>
      <div class="input-field">
        <label>📄 CONTENIDO DEL DISCURSO</label>
        <textarea id="contenidoInput" placeholder="Escribe el discurso completo..."></textarea>
      </div>
    </div>
    <div style="display: flex; justify-content: flex-end; margin-top: 24px;">
      <button class="btn-primary" id="guardarBtn">💾 Guardar discurso</button>
    </div>
  </div>

  <!-- BARRA BÚSQUEDA + FILTROS -->
  <div class="filters-section">
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="🔎 Buscar en título, contenido o descripción...">
    </div>
    <div class="filter-btn-group" id="filtrosContainer">
      <button class="filter-btn active" data-filter="todos">📋 Todos</button>
      <button class="filter-btn" data-filter="Propuesta corta">🔵 Propuesta corta</button>
      <button class="filter-btn" data-filter="Propuesta larga">🟣 Propuesta larga</button>
      <button class="filter-btn" data-filter="Defensa">🔴 Defensa</button>
      <button class="filter-btn" data-filter="Frases">🟢 Frases</button>
      <button class="filter-btn" data-filter="favoritos" id="filtroFavBtn">⭐ Favoritos</button>
    </div>
  </div>

  <!-- ZONA DE TARJETAS -->
  <div id="discursosContainer" class="discursos-grid">
    <!-- Se llena dinámicamente -->
  </div>
  <footer>🗂️ Datos guardados en tu navegador · offline · edición completa</footer>
</div>

<!-- MODAL DE EDICIÓN -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <h3>✏️ Editar discurso</h3>
    <div class="input-field">
      <label>Título</label>
      <input type="text" id="editTitulo">
    </div>
    <div class="input-field">
      <label>Categoría</label>
      <select id="editCategoria">
        <option value="Propuesta corta">🔵 Propuesta corta</option>
        <option value="Propuesta larga">🟣 Propuesta larga</option>
        <option value="Defensa">🔴 Defensa</option>
        <option value="Frases">🟢 Frases</option>
      </select>
    </div>
    <div class="input-field">
      <label>Descripción</label>
      <input type="text" id="editDescripcion">
    </div>
    <div class="input-field">
      <label>Contenido</label>
      <textarea id="editContenido" rows="5"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancelEditBtn">Cancelar</button>
      <button class="btn-primary" id="saveEditBtn">Guardar cambios</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- ESTADO GLOBAL ----------
    let discursos = [];
    let filtroActivo = 'todos';
    let textoBusqueda = '';
    let discursoEnEdicion = null;

    // Elementos DOM
    const tituloInput = document.getElementById('tituloInput');
    const categoriaSelect = document.getElementById('categoriaSelect');
    const descripcionInput = document.getElementById('descripcionInput');
    const contenidoInput = document.getElementById('contenidoInput');
    const guardarBtn = document.getElementById('guardarBtn');
    const container = document.getElementById('discursosContainer');
    const searchInput = document.getElementById('searchInput');
    const filtrosBtns = document.querySelectorAll('.filter-btn');
    
    // Modal
    const modal = document.getElementById('editModal');
    const editTitulo = document.getElementById('editTitulo');
    const editCategoria = document.getElementById('editCategoria');
    const editDescripcion = document.getElementById('editDescripcion');
    const editContenido = document.getElementById('editContenido');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const saveEditBtn = document.getElementById('saveEditBtn');

    // ---------- LOCALSTORAGE ----------
    function cargarDesdeStorage() {
      const stored = localStorage.getItem('mun_discursos_enciclopedia');
      if (stored) {
        try {
          discursos = JSON.parse(stored);
        } catch(e){ discursos = []; }
      } else {
        // EJEMPLOS INICIALES
        discursos = [
          {
            id: 'ej1',
            titulo: 'Moción de procedimiento',
            contenido: 'Señor Presidente, solicito una moción de procedimiento para extender el tiempo de oradores en 30 segundos, debido a la complejidad del tópico.',
            descripcion: 'Cuando el tiempo se agota y necesitas unos segundos extra.',
            categoria: 'Propuesta corta',
            favorito: false,
          },
          {
            id: 'ej2',
            titulo: 'Derecho a réplica',
            contenido: 'La delegación de Alemania desea ejercer su derecho a réplica frente a las declaraciones inexactas de la delegación de Francia. Solicitamos un minuto para aclarar.',
            descripcion: 'Para responder a acusaciones directas contra tu delegación.',
            categoria: 'Defensa',
            favorito: true,
          }
        ];
        guardarEnStorage();
      }
    }

    function guardarEnStorage() {
      localStorage.setItem('mun_discursos_enciclopedia', JSON.stringify(discursos));
    }

    // ---------- UTILIDADES ----------
    function obtenerClaseColor(categoria) {
      switch(categoria) {
        case 'Propuesta corta': return 'badge-prop-corta';
        case 'Propuesta larga': return 'badge-prop-larga';
        case 'Defensa': return 'badge-defensa';
        case 'Frases': return 'badge-frases';
        default: return 'badge-prop-corta';
      }
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"]/g, function(m){
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    // ---------- RENDERIZADO ----------
    function renderizarDiscursos() {
      let discursosFiltrados = discursos.filter(d => {
        if (filtroActivo === 'todos') return true;
        if (filtroActivo === 'favoritos') return d.favorito === true;
        return d.categoria === filtroActivo;
      });

      if (textoBusqueda.trim() !== '') {
        const term = textoBusqueda.trim().toLowerCase();
        discursosFiltrados = discursosFiltrados.filter(d => 
          d.titulo.toLowerCase().includes(term) ||
          d.contenido.toLowerCase().includes(term) ||
          d.descripcion.toLowerCase().includes(term)
        );
      }

      if (discursosFiltrados.length === 0) {
        container.innerHTML = `<div class="empty-message">✨ No hay discursos para este filtro · crea uno nuevo ✨</div>`;
        return;
      }

      let html = '';
      discursosFiltrados.forEach(discurso => {
        const colorClass = obtenerClaseColor(discurso.categoria);
        const favoritoActivo = discurso.favorito ? 'active-star' : '';
        const starIcon = discurso.favorito ? '★' : '☆';
        
        html += `
          <div class="card" data-id="${discurso.id}">
            <div class="card-header">
              <div class="card-title">${escapeHTML(discurso.titulo) || 'Sin título'}</div>
              <button class="favorite-star ${favoritoActivo}" data-action="toggleFav" data-id="${discurso.id}" aria-label="favorito">${starIcon}</button>
            </div>
            <div class="descripcion">📎 ${escapeHTML(discurso.descripcion) || '—'}</div>
            <span class="category-badge ${colorClass}">${escapeHTML(discurso.categoria)}</span>
            <div class="contenido-ocultable" id="contenido-${discurso.id}">${escapeHTML(discurso.contenido)}</div>
            <div class="card-actions">
              <button class="btn-icon" data-action="toggleContenido" data-id="${discurso.id}">📖 Mostrar</button>
              <button class="btn-icon" data-action="copiar" data-id="${discurso.id}">📋 Copiar</button>
              <button class="btn-icon btn-edit" data-action="editar" data-id="${discurso.id}">✏️ Editar</button>
              <button class="btn-icon btn-delete" data-action="eliminar" data-id="${discurso.id}">🗑️ Eliminar</button>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function actualizarClaseFiltros() {
      filtrosBtns.forEach(btn => {
        const filterValue = btn.dataset.filter;
        btn.classList.remove('active', 'fav-active');
        if (filterValue === filtroActivo) {
          btn.classList.add('active');
        }
        if (filterValue === 'favoritos' && filtroActivo === 'favoritos') {
          btn.classList.add('fav-active');
        }
      });
    }

    // ---------- ABRIR MODAL DE EDICIÓN ----------
    function abrirModalEdicion(discurso) {
      discursoEnEdicion = discurso;
      editTitulo.value = discurso.titulo;
      editCategoria.value = discurso.categoria;
      editDescripcion.value = discurso.descripcion;
      editContenido.value = discurso.contenido;
      modal.classList.add('active');
    }

    function cerrarModal() {
      modal.classList.remove('active');
      discursoEnEdicion = null;
    }

    function guardarEdicion() {
      if (!discursoEnEdicion) return;
      
      const nuevoTitulo = editTitulo.value.trim();
      const nuevoContenido = editContenido.value.trim();
      const nuevaDesc = editDescripcion.value.trim();
      
      if (!nuevoTitulo || !nuevoContenido || !nuevaDesc) {
        alert('⚠️ Todos los campos son obligatorios');
        return;
      }

      discursoEnEdicion.titulo = nuevoTitulo;
      discursoEnEdicion.categoria = editCategoria.value;
      discursoEnEdicion.descripcion = nuevaDesc;
      discursoEnEdicion.contenido = nuevoContenido;
      
      guardarEnStorage();
      renderizarDiscursos();
      cerrarModal();
    }

    // ---------- MANEJADORES DE EVENTOS ----------
    function manejarEventosContainer(e) {
      const target = e.target.closest('button');
      if (!target) return;
      const action = target.dataset.action;
      const id = target.dataset.id;

      if (action === 'toggleContenido') {
        const contenidoDiv = document.getElementById(`contenido-${id}`);
        if (contenidoDiv) {
          const isHidden = !contenidoDiv.classList.contains('mostrado');
          contenidoDiv.classList.toggle('mostrado');
          target.textContent = isHidden ? '📕 Ocultar' : '📖 Mostrar';
        }
      }
      else if (action === 'copiar') {
        const disc = discursos.find(d => d.id === id);
        if (disc) {
          navigator.clipboard?.writeText(disc.contenido).then(() => {
            target.textContent = '✅ Copiado!';
            setTimeout(() => target.textContent = '📋 Copiar', 1000);
          }).catch(() => alert('Copia manual: ' + disc.contenido));
        }
      }
      else if (action === 'toggleFav') {
        const disc = discursos.find(d => d.id === id);
        if (disc) {
          disc.favorito = !disc.favorito;
          guardarEnStorage();
          renderizarDiscursos(); 
          actualizarClaseFiltros();
        }
      }
      else if (action === 'eliminar') {
        if (confirm('¿Eliminar este discurso permanentemente?')) {
          discursos = discursos.filter(d => d.id !== id);
          guardarEnStorage();
          renderizarDiscursos();
        }
      }
      else if (action === 'editar') {
        const disc = discursos.find(d => d.id === id);
        if (disc) {
          abrirModalEdicion(disc);
        }
      }
    }

    function agregarDiscurso() {
      const titulo = tituloInput.value.trim();
      const contenido = contenidoInput.value.trim();
      const descripcion = descripcionInput.value.trim();
      const categoria = categoriaSelect.value;

      if (!titulo || !contenido || !descripcion) {
        alert('⚠️ Completa título, descripción y contenido.');
        return;
      }

      const nuevoDiscurso = {
        id: 'disc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        titulo,
        contenido,
        descripcion,
        categoria,
        favorito: false,
      };

      discursos.push(nuevoDiscurso);
      guardarEnStorage();
      
      tituloInput.value = '';
      contenidoInput.value = '';
      descripcionInput.value = '';
      categoriaSelect.value = 'Propuesta corta';

      renderizarDiscursos();
      actualizarClaseFiltros();
    }

    function setFiltro(nuevoFiltro) {
      filtroActivo = nuevoFiltro;
      actualizarClaseFiltros();
      renderizarDiscursos();
    }

    // ---------- INICIALIZACIÓN ----------
    function init() {
      cargarDesdeStorage();
      renderizarDiscursos();
      actualizarClaseFiltros();

      guardarBtn.addEventListener('click', agregarDiscurso);
      container.addEventListener('click', manejarEventosContainer);

      searchInput.addEventListener('input', (e) => {
        textoBusqueda = e.target.value;
        renderizarDiscursos();
      });

      filtrosBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          setFiltro(btn.dataset.filter);
        });
      });

      // Modal events
      cancelEditBtn.addEventListener('click', cerrarModal);
      saveEditBtn.addEventListener('click', guardarEdicion);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) cerrarModal();
      });

      // Cerrar modal con ESC
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
          cerrarModal();
        }
      });
    }

    init();
  })();
</script>
</body>
</html>
